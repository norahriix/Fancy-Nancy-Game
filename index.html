<style>
/* ===== الثيم العام والخلفية المتحركة ===== */
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: white;
  overflow: hidden;
  background: linear-gradient(135deg, #f8c8dc, #d9b3ff, #a2d2ff);
}

.bg-colors {
  position: fixed;
  width: 100%; height: 100%;
  background: linear-gradient(270deg, #ff9a9e, #fbc2eb, #a1c4fd, #c2e9fb, #fddb92);
  background-size: 800% 800%;
  animation: colorMove 15s ease infinite;
  z-index: 0;
}
@keyframes colorMove {
  0% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

.bg-image {
  position: fixed;
  width: 100%; height: 100%;
  background-image: url('yy.png');
  background-size: cover;
  background-position: center;
  animation: moveUp 6s ease-in-out infinite; 
  opacity: 0.8;
  z-index: 1;
}

@keyframes moveUp {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); } 
  100% { transform: translateY(0); }
}

.container {
  width: 92%; 
  max-width: 550px; 
  max-height: 92vh;
  overflow-y: auto;
  background: rgba(255, 255, 255, 0.25); 
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-radius: 35px;
  padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.3);
  text-align: center;
  position: relative;
  z-index: 2;
}
.container::-webkit-scrollbar { width: 0px; }

button {
  font-size: 22px;
  padding: 12px 28px;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 50px;
  margin: 8px;
  cursor: pointer;
  font-weight: 900;
  background: rgba(255, 255, 255, 0.2); 
  color: white; 
  text-shadow: 2px 2px 5px rgba(0,0,0,0.6); 
  transition: .3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
button:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.05); }

.card, .card-number {
  width: 60px;
  height: 60px;
  font-size: 26px;
  font-weight: 900;
  background: rgba(255,255,255,0.25);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: .3s;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
  margin: 5px;
}

.title { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 3px 3px 10px black; margin-bottom: 10px; }
.subtitle { font-size: 22px; font-weight: 800; color: #fff; text-shadow: 1px 1px 5px black; margin: 10px 0; line-height: 1.4; }

.score-table {
  width: 100%;
  margin-bottom: 15px;
  border-collapse: collapse;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  overflow: hidden;
}
.score-table th, .score-table td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-weight: 900; text-shadow: 1px 1px 3px black; }

#timer { font-size: 42px; font-weight: 900; color: white; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); margin: 5px 0; }
input { width: 85%; padding: 15px; font-size: 20px; border-radius: 30px; border: none; text-align: center; font-weight: 900; background: rgba(255,255,255,0.8); margin-bottom: 10px; color: #333; }
.player { background: rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 15px; margin: 5px; font-weight: 900; }
.card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
.effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; animation: fade 1s ease; z-index: 99; }
@keyframes fade { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; } }

@media (max-width: 480px) {
  .title { font-size: 30px; }
  .subtitle { font-size: 19px; }
  button { font-size: 17px; padding: 10px 18px; }
}
</style>
</head>

    {q: "ماذا يسمى صوت الدجاجة ؟", a: "نقنقة"},
    {q: "ماهي الحشرة التي تكلّمت في القرآن الكريم؟", a: "النملة"},
    {q: "ما هي أكبر دولة إسلامية في أفريقيا؟", a: "نيجيريا"},
    {q: "ماذا يسمى الشخص الذي يقوم بنقل الأخبار والوشاية؟", a: "نمّام"},
    {q: "ما هو الجزء الصلب الموجود في وسط التمرة؟", a: "نواة"}
  ],
  "ه": [
    {q: "ما هو الاسم الذي يُطلق على الشكل الهندسي المكون من قاعدة مضلعة وأوجه مثلثية؟", a: "هرم"},
    {q: "ما هو المصطلح الطبي الذي يصف المادة البروتينية الموجودة في كرات الدم الحمراء؟", a: "هيموجلوبين"},
    {q: "ما هو المصطلح الذي يصف 'المادة' التي تفرزها الغدد الصماء؟", a: "هرمون"},
    {q: "ما هو المصطلح الذي يصف 'السقوط' أو التحطم المفاجئ للبناء؟", a: "هدم"},
    {q: "ما هو المصطلح الذي يصف 'الاهتزاز' المفاجئ لسطح الأرض؟", a: "هزة أرضية"},
    {q: "ما هي 'الوحدة' الفيزيائية الدولية التي تُستخدم لقياس التردد؟", a: "هرتز"},
    {q: "ما هو المصطلح الذي يصف 'الفرار' من خطر ما؟", a: "هروب"},
    {q: "ما هو الاسم الذي يُطلق على 'الطائر' الصغير الذي يُضرب به المثل في السرعة؟", a: "هدهد"},
    {q: "ماذا يسمى أخفى ما يكون من الصوت ؟", a: "همس"},
    {q: "هو المنطق الفارغ الذي لا معنى له؟", a: "هراء"}
  ],
  "وا": [
    {q: "ما هو المصطلح الذي يصف 'المكان' الطبيعي الذي تعيش فيه الكائنات الحية؟", a: "وطن"},
    {q: "ما هو 'اللقب' التاريخي الذي يُطلق على الشخص الذي يرث الحكم؟", a: "ولي عهد"},
    {q: "ما هي 'العملة' الرسمية المستخدمة في كوريا الشمالية وكوريا الجنوبية؟", a: "وون"},
    {q: "ما هو المصطلح الذي يصف 'القدرة' على إدراك الأشياء وتصورها؟", a: "وعي"},
    {q: "ما هو المصطلح الذي يصف 'المنخفض' بين الجبال؟", a: "وادي"},
    {q: "غطاء يوضع فوق الأكتاف للزينة أو التدفئة؟", a: "وشاح"},
    {q: "ما هو المصطلح الذي يصف 'الكتلة' التي يُقاس بها ثقل الأجسام؟", a: "وزن"},
    {q: "ما هي 'الوحدة' التي تُقاس بها القدرة الكهربائية؟", a: "واط"},
    {q: "هو كل مايتصوره الإنسان في داخله وهو غير صحيح؟", a: "الوهم"},
    {q: "ماهو اسم الطين الرقيق؟", a: "الوحل"}
  ],
  "ي": [
    {q: "ما اسم الحجر الكريم الثمين المعروف بلونه الأحمر الصافي؟", a: "ياقوت"},
    {q: "ما هو المصطلح الذي يصف 'الأرض' الجافة القاسية مقابل الماء؟", a: "يابس"},
    {q: "ما هو الاسم الذي يُطلق على 'المكان' الذي تخرج منه المياه من الأرض؟", a: "ينبوع"},
    {q: "ما هو 'اللقب' الذي يُطلق على ذكر النحل أو رئيس النحل؟", a: "يعسوب"},
    {q: "ما هو المصطلح الذي يصف 'السهولة' واللين في التعامل؟", a: "يسر"},
    {q: "ما هو المصطلح الذي يصف 'العلم' التام الذي لا يخالطه شك؟", a: "يقين"},
    {q: "أكمل المثل : إذا أردت أن تطاع , فأمر بما يستطاع", a: "يستطاع"},
    {q: "هو ما يكون حول العنق من اللباس و الهندام ؟", a: "ياقة"},
    {q: "هي مرحلة النمو التي تسبق التحول إلى فراشة ؟", a: "يرقة"},
    {q: "دولة تقع شرق آسيا وتتألف من أرخبيل من الجزر؟", a: "اليابان"}
  ]
};

function home(){
  app.innerHTML=`
    <div class="title">Fancy Nancy Game</div>
    <p class="subtitle">اختر نمط اللعبة</p>
    <button onclick="setMode('solo')">فردي</button>
    <button onclick="setMode('team')">فرق</button>
  `;
}

function setMode(m){
  mode=m; playersData={}; teamScores={A:0,B:0};
  if(mode=="solo"){
      app.innerHTML=`
        <p class="subtitle">أدخل أسماء اللاعبين</p>
        <input id="pName" placeholder="اسم اللاعب"><br>
        <button onclick="addSoloPlayer()">إضافة لاعب</button>
        <div id="pList" class="card-container"></div>
        <br><button onclick="startGame()">ابدأ اللعبة</button>
        <button onclick="home()">رجوع</button>
      `;
  } else {
      app.innerHTML=`
        <p class="subtitle">فريق A</p>
        <input id="a" placeholder="اسم اللاعب"><button onclick="addTeam('A')">إضافة</button>
        <div id="A" class="card-container"></div>
        <p class="subtitle">فريق B</p>
        <input id="b" placeholder="اسم اللاعب"><button onclick="addTeam('B')">إضافة</button>
        <div id="B" class="card-container"></div>
        <br><button onclick="startGame()">ابدأ اللعبة</button>
        <button onclick="home()">رجوع</button>
      `;
  }
}

function addSoloPlayer(){
    let val=document.getElementById("pName").value.trim();
    if(!val) return;
    playersData[val] = 0;
    document.getElementById("pList").innerHTML=Object.keys(playersData).map(x=>`<div class="player">${x}</div>`).join('');
    document.getElementById("pName").value="";
}

function addTeam(t){
  let val=document.getElementById(t.toLowerCase()).value.trim();
  if(!val) return;
  if(!teams[t]) teams[t]=[];
  teams[t].push(val);
  playersData[val] = 0;
  document.getElementById(t).innerHTML=teams[t].map(x=>`<div class="player">${x}</div>`).join('');
  document.getElementById(t.toLowerCase()).value="";
}

function startGame(){
  app.innerHTML=`
    <div class="title">اختر اللعبة</div>
    <button onclick="startLetterGame()">لعبة الحروف</button>
    <br><br><button onclick="home()">خروج</button>
  `;
}

function startLetterGame(){
  app.innerHTML=`
    <div class="title">اختر حرف</div>
    <p style="color: #ff85a1; background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 15px; font-weight: 800; font-size: 18px; text-shadow: 1px 1px 3px black; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.5);">ملاحظة : قد تكون الإجابة مُعرّفة بـ(الـ) التعريف</p>
    <div class="card-container">
      ${"أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split("").map(l=>`<div class="card" onclick="openLetter('${l}')">${l}</div>`).join('')}
    </div>
    <br><button onclick="startGame()">رجوع</button>
  `;
}

function openLetter(l){
  currentLetter=l;
  let key = (l === "و") ? "وا" : l; 
  if(!usedCards[key]) usedCards[key]=Array(10).fill(false);
  let cards="";
  for(let i=0;i<10;i++){
    let dis=usedCards[key][i]?"style='opacity:.3;cursor:not-allowed'":"";
    cards+=`<div class="card-number" ${dis} onclick="openCard(${i})">${i+1}</div>`;
  }
  app.innerHTML=`
    <div class="title">حرف ${l}</div>
    <div class="card-container">${cards}</div>
    <br><button onclick="startLetterGame()">رجوع</button>
  `;
}

function openCard(i){
  let key = (currentLetter === "و") ? "وا" : currentLetter;
  if(usedCards[key][i]) return;
  currentCard=i;
  let q = letterQuestions[key]?.[i] || {q:"سؤال قادم قريباً...", a:"..."};

  app.innerHTML=`
    ${renderScoreTable()}
    <div class="subtitle">${q.q}</div>
    <div id="timer">20</div>
    <div id="ansBox" style="display:none; margin:10px 0; padding:15px; background:rgba(255,255,255,0.25); border-radius:15px; font-size:24px; font-weight:900; border:1px solid white;">
      الإجابة: ${q.a}
    </div>
    <button id="revealBtn" onclick="revealAnswer()">إظهار الإجابة</button>
    <div id="controls">
      <p style="font-weight:900; margin:5px; text-shadow:1px 1px 3px black;">من أجاب؟</p>
      <div class="card-container">
        ${Object.keys(playersData).map(n=>`<button onclick="addPoint('${n}')" style="font-size:18px; padding:8px 18px;">${n}</button>`).join('')}
        <button onclick="addPoint('none')" style="background:rgba(0,0,0,0.4);">لا أحد</button>
      </div>
    </div>
    <button onclick="finishCard()" style="width:100%; margin-top:10px; border:none; background:rgba(255,255,255,0.4);">التالي</button>
  `;
  startTimer(20);
}

function renderScoreTable(){
    let rows = "";
    if(mode === 'team') {
        rows = `<tr><td>فريق A</td><td>${teamScores.A}</td></tr><tr><td>فريق B</td><td>${teamScores.B}</td></tr>`;
    } else {
        rows = Object.entries(playersData).map(([name, score]) => `<tr><td>${name}</td><td>${score}</td></tr>`).join('');
    }
    return `<table class="score-table"><thead><tr><th>الاسم</th><th>النقاط</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function startTimer(sec){
  let timeLeft=sec;
  let display=document.getElementById("timer");
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    display.innerText=timeLeft;
    if(timeLeft<=0){ clearInterval(timerInterval); display.style.color="#ff4d9e"; effect("⏰"); }
  },1000);
}

function revealAnswer(){
  clearInterval(timerInterval);
  document.getElementById("ansBox").style.display="block";
  document.getElementById("revealBtn").style.display="none";
}

function addPoint(name){
  if(name!=="none"){
    playersData[name]++;
    if(mode === 'team'){
        if(teams.A.includes(name)) teamScores.A++;
        else if(teams.B.includes(name)) teamScores.B++;
    }
    effect("🎉");
    app.querySelector('.score-table').outerHTML = renderScoreTable();
  } else {
    effect("❌");
  }
}

function finishCard(){
  clearInterval(timerInterval);
  let key = (currentLetter === "و") ? "وا" : currentLetter;
  usedCards[key][currentCard]=true;
  openLetter(currentLetter);
}

function effect(e){
  let d=document.createElement("div"); d.className="effect"; d.innerText=e;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

window.onload=home;
</script>
</body>
</html>
